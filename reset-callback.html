<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bhagavad Gita – Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #000;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      overflow: hidden;
    }

    /* Subtle radial glow behind the card */
    body::before {
      content: '';
      position: fixed;
      top: 50%; left: 50%;
      width: 500px; height: 500px;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(255,111,49,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 360px;
      width: 100%;
      animation: fadeUp 0.6s ease-out both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* App icon */
    .app-icon {
      width: 72px; height: 72px;
      margin: 0 auto 28px;
      border-radius: 18px;
      background: #1A1A1A;
      border: 1px solid #2A2A2A;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
      box-shadow: 0 8px 32px rgba(255,111,49,0.12);
    }

    /* Title */
    h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 8px;
      color: #fff;
    }

    /* Subtitle */
    .subtitle {
      font-size: 14px;
      font-weight: 400;
      color: #999;
      line-height: 1.5;
      margin-bottom: 32px;
    }

    /* Pulse ring loader */
    .loader {
      position: relative;
      width: 40px; height: 40px;
      margin: 0 auto 32px;
    }
    .loader .ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2.5px solid transparent;
      border-top-color: #FF6F31;
      animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    .loader .ring:nth-child(2) {
      inset: 5px;
      border-top-color: rgba(255,111,49,0.35);
      animation-duration: 1.4s;
      animation-direction: reverse;
    }
    .loader .dot {
      position: absolute;
      top: 50%; left: 50%;
      width: 6px; height: 6px;
      margin: -3px 0 0 -3px;
      border-radius: 50%;
      background: #FF6F31;
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; transform: scale(0.8); }
      50%      { opacity: 1;   transform: scale(1.2); }
    }

    /* Status text */
    .status {
      font-size: 13px;
      color: #666;
      margin-bottom: 32px;
      transition: opacity 0.3s;
    }

    /* CTA button — hidden until fallback triggers */
    .btn {
      display: none;
      padding: 14px 32px;
      background: #FF6F31;
      color: #fff;
      border: none;
      border-radius: 14px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:hover  { background: #e5622a; }
    .btn:active { transform: scale(0.97); }

    /* Footer note */
    .note {
      margin-top: 24px;
      font-size: 12px;
      color: #444;
      line-height: 1.6;
    }

    /* Divider */
    .divider {
      width: 40px;
      height: 1px;
      background: #2A2A2A;
      margin: 24px auto;
    }

    .brand {
      font-size: 11px;
      color: #333;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="app-icon">🙏</div>

    <h1>Opening Bhagavad Gita</h1>
    <p class="subtitle">Taking you to the app to set your new password.</p>

    <div class="loader" id="loader">
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="dot"></div>
    </div>

    <p class="status" id="status">Redirecting…</p>

    <a class="btn" id="openBtn" href="com.sacredgita.app://reset-callback">
      Open Bhagavad Gita
    </a>

    <p class="note" id="note" style="display:none;">
      If the app didn't open automatically,<br/>tap the button above.
    </p>

    <div class="divider"></div>
    <p class="brand">Sacred Gita</p>
  </div>

  <script>
    var deepLink = 'com.sacredgita.app://reset-callback' + window.location.hash;

    // Auto-redirect after a short pause
    setTimeout(function () {
      window.location.href = deepLink;
    }, 800);

    // Show manual button if still on page after 3s
    setTimeout(function () {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('status').style.display = 'none';
      var btn = document.getElementById('openBtn');
      btn.href = deepLink;
      btn.style.display = 'inline-block';
      document.getElementById('note').style.display = 'block';
    }, 3000);
  </script>
</body>
</html>

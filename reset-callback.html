<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bhagavad Gita – Resetting Password</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1A1410;
      color: #F5EDE4;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      text-align: center;
      max-width: 380px;
    }
    .icon {
      width: 64px; height: 64px;
      margin: 0 auto 20px;
      border-radius: 16px;
      background: linear-gradient(135deg, #E8854A, #D4722E);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    p {
      font-size: 14px;
      color: #A89888;
      line-height: 1.5;
      margin-bottom: 24px;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid rgba(232, 133, 74, 0.2);
      border-top-color: #E8854A;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fallback {
      display: inline-block;
      padding: 14px 28px;
      background: linear-gradient(135deg, #E8854A, #D4722E);
      color: #fff;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      transition: opacity 0.2s;
    }
    .fallback:hover { opacity: 0.9; }
    .note {
      margin-top: 16px;
      font-size: 12px;
      color: #6B5C50;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🙏</div>
    <h1>Opening Bhagavad Gita…</h1>
    <p>You'll be redirected to the app to set your new password.</p>
    <div class="spinner" id="spinner"></div>
    <a class="fallback" id="fallback" style="display:none;"
       href="com.sacredgita.app://reset-callback">
      Open App
    </a>
    <p class="note">If the app didn't open, tap the button above.<br/>
    You can close this tab after the app opens.</p>
  </div>
  <script>
    // Pass along any hash fragment from Supabase (contains the access token)
    var deepLink = 'com.sacredgita.app://reset-callback' + window.location.hash;

    // Try opening the app immediately
    setTimeout(function () {
      window.location.href = deepLink;
    }, 600);

    // Show fallback button after 2.5 seconds if still on this page
    setTimeout(function () {
      document.getElementById('spinner').style.display = 'none';
      var btn = document.getElementById('fallback');
      btn.href = deepLink;
      btn.style.display = 'inline-block';
    }, 2500);
  </script>
</body>
</html>
